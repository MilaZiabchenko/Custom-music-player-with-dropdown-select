<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/select.css" />
    <script src="js/main.js" type="module"></script>
    <title>Custom Music Player</title>
  </head>
  <body>
    <header>
      <h1>Keep Calm & Play</h1>
    </header>

    <section class="music-container">
      <div class="music-info">
        <h4 id="title"></h4>
        <div class="progress-container">
          <div class="progress"></div>
        </div>
      </div>

      <audio id="audio" preload="auto"></audio>

      <div class="img-container">
        <img id="cover" alt="music-cover" />
      </div>

      <div class="navigation">
        <button id="prev" class="action-btn">
          <i class="fas fa-backward"></i>
        </button>
        <button id="play" class="action-btn action-btn-big">
          <i class="fas fa-play"></i>
        </button>
        <button id="next" class="action-btn">
          <i class="fas fa-forward"></i>
        </button>
      </div>
    </section>

    <section class="dropdown-selection">
      <label>Select a song to play...</label>
      <select data-select>
        <option id="option">Avishai Cohen - Remembering</option>
        <option id="option">Corpo-Mente - Fia</option>
        <option id="option">Kovacs - My Love</option>
        <option id="option">Muse - Drones</option>
        <option id="option">Muse - Map Of Your Head</option>
        <option id="option">Pomme - On Brûlera</option>
        <option id="option">Rammstein - Diamant</option>
        <option id="option">Thom Yorke - Suspirium</option>
        <option id="option">Yann Tiersen - Les Jours Tristes</option>
        <option id="option">ZAZ - Éblouie Par La Nuit</option>
      </select>
    </section>
  </body>
</html>
